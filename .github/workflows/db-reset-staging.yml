name: Réinitialiser la base staging

on:
  workflow_dispatch:

jobs:
  reset-staging-db:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Purge, migrations et seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          AUTH_URL: https://la-ferme-se-rebelle-staging.vercel.app
        run: npm run db:reset
